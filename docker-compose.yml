version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: smartflow_db
    environment:
      POSTGRES_USER: smartflow
      POSTGRES_PASSWORD: smartflow123
      POSTGRES_DB: smartflow_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartflow -d smartflow_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: smartflow_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    container_name: smartflow_backend
    environment:
      DATABASE_URL: postgresql+asyncpg://smartflow:smartflow123@db:5432/smartflow_db
      REDIS_URL: redis://redis:6379
      SECRET_KEY: dev-secret-change-in-production-32chars!!
      ENVIRONMENT: development
      DEBUG: "true"
      FRONTEND_URL: http://localhost:5173
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    image: node:20-alpine
    container_name: smartflow_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000/api/v1
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend

volumes:
  postgres_data:
