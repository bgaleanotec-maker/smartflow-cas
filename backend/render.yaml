services:
  - type: web
    name: smartflow-backend
    env: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: smartflow-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: FRONTEND_URL
        value: https://smartflow-frontend.onrender.com
      - key: REDIS_URL
        fromService:
          name: smartflow-redis
          type: redis
          property: connectionString

  - type: redis
    name: smartflow-redis
    plan: free
    maxmemoryPolicy: allkeys-lru

databases:
  - name: smartflow-db
    plan: free
    databaseName: smartflow_db
    user: smartflow
