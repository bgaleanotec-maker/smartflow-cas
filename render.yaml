services:
  # ─── BACKEND ──────────────────────────────────────────────────────────────
  - type: web
    name: smartflow-api
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    plan: standard
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: smartflow-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: FRONTEND_URL
        value: https://smartflow-casbo.onrender.com
      # ── Gemini — IA para análisis de reuniones y ARIA chat ─────────────────
      - key: GEMINI_API_KEY
        value: AIzaSyCPuXZzCgiwOL8uESF-MPyRPQB2WyxbU58
      # ── OpenAI — Whisper STT ($0.006/min, límite $25/mes ≈ 100k COP) ─────────
      - key: OPENAI_API_KEY
        sync: false   # set manually in Render dashboard — key: sk-proj-mCEjv85...hkL4A
      - key: GROQ_API_KEY
        sync: false   # optional fallback Whisper — set in Render dashboard if needed
      # ── Deepgram — transcripción con diarización (identificación de hablantes)
      - key: DEEPGRAM_API_KEY
        value: 40204577f80c7e940347048f6252b8c6d7af3ab7
      # ── ElevenLabs — TTS para voz de ARIA ─────────────────────────────────
      - key: ELEVENLABS_API_KEY
        value: sk_aa36d75923b50befd36af6e05463c64b80de246963fac35b
      - key: ELEVENLABS_VOICE_ID
        value: UgBBYS2sOqTuMpoF3BR0

  # ─── FRONTEND ─────────────────────────────────────────────────────────────
  - type: web
    name: smartflow-casbo
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    plan: free
    envVars:
      - key: VITE_API_URL
        value: https://smartflow-api-0ric.onrender.com/api/v1
    routes:
      - type: rewrite
        source: /api/*
        destination: https://smartflow-api-0ric.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html

# ─── BASE DE DATOS ──────────────────────────────────────────────────────────
databases:
  - name: smartflow-db
    plan: free
    databaseName: smartflow_db
    user: smartflow
