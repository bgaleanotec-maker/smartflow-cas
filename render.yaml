services:
  - type: web
    name: smartflow-api
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: smartflow-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: FRONTEND_URL
        value: https://smartflow-cas.onrender.com

  - type: web
    name: smartflow-cas
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    plan: free
    routes:
      - type: rewrite
        source: /api/*
        destination: https://smartflow-api.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: smartflow-db
    plan: free
    databaseName: smartflow_db
    user: smartflow
